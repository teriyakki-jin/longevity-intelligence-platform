model:
  type: lightgbm
  target: chronological_age
  cv_folds: 5
  stratify_by: age_decile

hyperparameters:
  n_trials: 100
  n_estimators: [200, 2000]
  max_depth: [3, 10]
  learning_rate: [0.01, 0.3]
  subsample: [0.6, 1.0]
  colsample_bytree: [0.6, 1.0]
  reg_alpha: [1.0e-8, 10.0]
  reg_lambda: [1.0e-8, 10.0]
  min_child_samples: [10, 100]

evaluation:
  primary_metric: mae
  secondary_metrics: [pearson_r, r2]
  mortality_validation_cindex_threshold: 0.65

output:
  model_path: models/bioage/blood_clock.joblib
  mlflow_experiment: bioage-blood-clock
