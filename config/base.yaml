project:
  name: longevity-intelligence-platform
  version: "0.1.0"
  seed: 42

paths:
  data_raw: data/raw
  data_interim: data/interim
  data_processed: data/processed
  data_external: data/external
  models: models
  logs: logs
  mlflow_uri: mlflow_runs

logging:
  level: INFO
  format: json

nhanes:
  cycles:
    - "1999-2000"
    - "2001-2002"
    - "2003-2004"
    - "2005-2006"
    - "2007-2008"
    - "2009-2010"
    - "2011-2012"
    - "2013-2014"
    - "2015-2016"
    - "2017-2018"
    - "2017-2020"
  base_url: "https://wwwn.cdc.gov/Nchs/Nhanes"
  mortality_url: "https://ftp.cdc.gov/pub/Health_Statistics/NCHS/datalinkage/linked_mortality"

features:
  blood_markers:
    - glucose_mg_dl
    - hba1c_pct
    - total_cholesterol_mg_dl
    - hdl_mg_dl
    - ldl_mg_dl
    - triglycerides_mg_dl
    - creatinine_mg_dl
    - alt_u_l
    - ast_u_l
    - albumin_g_dl
    - wbc_1000_ul
    - hemoglobin_g_dl
    - platelets_1000_ul
    - crp_mg_l
    - uric_acid_mg_dl
    - egfr
    - fib4_score
    - homa_ir
  lifestyle:
    - smoking_status
    - pack_years
    - drinks_per_week
    - exercise_met_min_week
    - sleep_hours
  anthropometric:
    - bmi
    - waist_cm
    - waist_hip_ratio
  demographic:
    - age
    - sex
    - race_ethnicity
