simulator:
  n_simulations: 1000
  time_horizons_years: [1, 3, 5, 10]
  confidence_level: 0.95

causal_graph:
  # Effect sizes from meta-analyses (units: per-SD change in outcome)
  edges:
    - source: exercise_minutes_per_week
      target: hdl_mg_dl
      effect_size: 0.12
      effect_direction: positive
      evidence: "meta-analysis, RCT validated"

    - source: exercise_minutes_per_week
      target: bmi
      effect_size: -0.08
      effect_direction: negative
      evidence: "meta-analysis"

    - source: exercise_minutes_per_week
      target: glucose_mg_dl
      effect_size: -0.10
      effect_direction: negative
      evidence: "RCT validated"

    - source: smoking_status
      target: crp_mg_l
      effect_size: 0.25
      effect_direction: positive
      evidence: "observational, strong"

    - source: smoking_status
      target: hdl_mg_dl
      effect_size: -0.15
      effect_direction: negative
      evidence: "observational, strong"

    - source: drinks_per_week
      target: alt_u_l
      effect_size: 0.18
      effect_direction: positive
      evidence: "dose-response established"

    - source: drinks_per_week
      target: triglycerides_mg_dl
      effect_size: 0.14
      effect_direction: positive
      evidence: "dose-response established"

    - source: sleep_hours
      target: glucose_mg_dl
      effect_size: -0.08
      effect_direction: negative
      evidence: "RCT validated (short sleep -> higher glucose)"

    - source: sleep_hours
      target: crp_mg_l
      effect_size: -0.10
      effect_direction: negative
      evidence: "observational, moderate"

    - source: bmi
      target: glucose_mg_dl
      effect_size: 0.20
      effect_direction: positive
      evidence: "causal, strong"

    - source: bmi
      target: total_cholesterol_mg_dl
      effect_size: 0.12
      effect_direction: positive
      evidence: "observational, moderate"

    - source: bmi
      target: crp_mg_l
      effect_size: 0.22
      effect_direction: positive
      evidence: "causal, strong (adipose tissue inflammation)"

interventions:
  exercise_minutes_per_week:
    min: 0
    max: 500
    unit: minutes/week
    label: Weekly Exercise

  sleep_hours:
    min: 4
    max: 10
    unit: hours/night
    label: Sleep Duration

  drinks_per_week:
    min: 0
    max: 50
    unit: standard drinks/week
    label: Alcohol Consumption

  smoking_status:
    options: [never, former, current]
    label: Smoking Status

  bmi:
    min: 15
    max: 50
    unit: kg/m²
    label: BMI

output:
  model_path: models/twin
